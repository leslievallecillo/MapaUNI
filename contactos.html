<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contactos | UNI-WAY</title>

  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700;900&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

  <link rel="stylesheet" href="Style/styles.css">
  <link rel="stylesheet" href="Style/contactos.css">
</head>

<body>

<div id="menu-contenedor"></div>

<main>
  <div id="vista-contactos" class="vista activa">

    <section id="contacto" class="anim-element visible contact-section">

      <h2 id="titulo-contacto" class="section-title"></h2>

      <p id="subtitulo-contacto" class="section-subtitle"></p>

      <div class="contact-container">

        <div class="contact-form-column">

          <form
            class="contact-form"
            action="https://formspree.io/f/mjgjnpog"
            method="POST"
          >

            <div class="form-group">
              <label id="label-nombre" class="form-label"></label>

              <input
                id="nombre"
                name="nombre"
                type="text"
                required
                class="form-input"
              >
            </div>

            <div class="form-group">
              <label id="label-correo" class="form-label"></label>

              <input
                id="correo"
                name="email"
                type="email"
                required
                class="form-input"
              >
            </div>

            <div class="form-group-message">
              <label id="label-mensaje" class="form-label"></label>

              <textarea
                id="mensaje"
                name="mensaje"
                rows="5"
                required
                class="form-textarea"
              ></textarea>
            </div>

            <button
              id="boton-enviar"
              type="submit"
              class="btn-glow submit-button"
            >
            </button>

          </form>
        </div>

        <div class="contact-info-column">

          <div class="info-card">
            <div class="icon-circle">
              <span class="material-icons">email</span>
            </div>

            <div>
              <h3 id="info-correo-titulo" class="info-title"></h3>

              <a
                id="info-correo-email"
                href="#"
                class="info-link"
              ></a>

              <p id="info-correo-detalle" class="info-small"></p>
            </div>
          </div>

          <div class="info-card">
            <div class="icon-circle">
              <span class="material-icons">location_on</span>
            </div>

            <div>
              <h3 id="info-ubicacion-titulo" class="info-title"></h3>

              <p id="info-ubicacion-detalle" class="info-text"></p>
            </div>
          </div>

          <div class="info-card">
            <div class="icon-circle">
              <span class="material-icons">groups</span>
            </div>

            <div>
              <h3 id="info-colaboracion-titulo" class="info-title"></h3>

              <p id="info-colaboracion-detalle" class="info-text"></p>
            </div>
          </div>

        </div>
      </div>
    </section>
  </div>
</main>

<footer>
  <div class="footer-container">

    <div class="footer-info">
      <h3>
        <i class="fa-solid fa-map-location-dot"></i>
        <span id="footer-marca"></span>
      </h3>

      <p id="footer-descripcion"></p>
    </div>

    <div class="footer-enlaces">
      <h4>Enlaces Rápidos</h4>

      <ul>
        <li><a href="nosotros.html">Misión y Visión</a></li>
        <li><a href="destinos.html">Tour de Edificios</a></li>
        <li><a href="nosotros.html#equipo">Desarrolladores</a></li>
      </ul>
    </div>

    <div class="footer-contacto">
      <h4>Contacto</h4>

      <p>
        <i class="fa-solid fa-envelope"></i>
        <span id="footer-correo"></span>
      </p>

      <p>
        <i class="fa-solid fa-location-dot"></i>
        <span id="footer-ubicacion"></span>
      </p>
    </div>

  </div>

  <div class="footer-bottom">
    <p id="footer-copyright"></p>
  </div>
</footer>

<script src="Script/script.js"></script>
<script src="Script/contacto.js"></script>

</body>
</html>
